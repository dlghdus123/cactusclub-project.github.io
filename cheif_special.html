<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cactus club cafe - Chef's Special</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
  <link href="cheif_special.css" rel="stylesheet" type="text/css" />
</head>

<body>
  <header>
    <div class="header-wrap layout-width">
      <h1>
        CACTUS CLUB CAFE
      </h1>
      <div class="btns-wrap">
        <a class="home-btn" href="./index.html">
          HOME 
        </a>
        <a class="cheif-special-btn" href="./cheif_special.html">
          CHEF's SPECIAL
        </a>
        <a class="own-menu-btn" href="./own_menu.html">
          OWN MENU
        </a>
      </div>
    </div>
  </header>

  <section id="cheif-special-section" class="layout-width">
    <h2>Chef's Special Course</h2>
    <p>This is the chef special course</p>
    <div class="checkbox-container">
      <div class="allergy-container">
        <label for="allergyBtn">
          <input type="checkbox" id="allergyBtn">
          Do you have any allergy?
        </label>
        <div class="allergy-list">
          <label for="peanuts">
            <input type="checkbox" id="peanuts" data-value="peanuts">
            Peanuts
          </label>

          <label for="wheat">
            <input type="checkbox" id="wheat" data-value="wheat">
            Wheat
          </label>
          <label for="soy">
            <input type="checkbox" id="soy" data-value="soy">
            Soy
          </label>
          <label for="shellfish">
            <input type="checkbox" id="shellfish" data-value="shellfish">
            Shellfish
          </label>
          <label for="fish">
            <input type="checkbox" id="fish" data-value="fish">
            Fish
          </label>
          <label for="dairy">
            <input type="checkbox" id="dairy" data-value="dairy">
            Dairy
          </label>
          <label for="coconut">
            <input type="checkbox" id="coconut" data-value="coconut">
            Coconut
          </label>
          <label for="sesame">
            <input type="checkbox" id="sesame" data-value="sesame">
            Sesame
          </label>
          <label for="nuts">
            <input type="checkbox" id="nuts" data-value="nuts">
            Nuts
          </label>
          <label for="eggs">
            <input type="checkbox" id="eggs" data-value="eggs">
            Eggs
          </label>
        </div>
      </div>
      <div>
        <label for="veganBtn">
          <input type="checkbox" id="veganBtn">
          Do you want a Vegan menu?
        </label>
      </div>
    </div>
    <div>
      <button class="underline-btn" id="cheifSubmitBtn">
        Submit
      </button>
    </div>
  </section>

  <footer>
    <p class="footer-wrap layout-width">© Hoyeon and Jiwoo. All rights reserved.</p>
  </footer>



  <div id="modalContainer">
    <div class="modal-content-container">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Chef's Special</h2>
        </div>
        <div class="modal-body">
          <p id="modalText">
            Loading ...
          </p>
        </div>
        <div class="modal-footer">
          <button class="underline-btn" id="modalCloseBtn" style="color: lightgrey">
            Close
          </button>
          <a class="underline-btn" href="./checkout.html">
            Checkout
          </a>
        </div>
      </div>
    </div>
  </div>


  <script src="script.js"></script>
  <script src="addMenu.js"></script>
  <script src="cheif_special.js"></script>
</body>

</html>
